<!doctype html>
<html lang="so">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Baxnaano Hospital – Patient Data Organizer</title>

<style>
body{font-family:Inter,system-ui;background:#f4f6f8;margin:0;padding:20px}
.container{max-width:1400px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
h1{margin:0}
.sub{color:#6b7280;font-size:13px;margin-bottom:15px}
.form-section{background:#f8fafc;padding:15px;border-radius:8px;margin-bottom:15px}
.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
input,select,textarea{padding:10px;border:1px solid #e5e7eb;border-radius:6px;font-size:14px}
textarea{grid-column:1/-1;height:100px}
button{padding:10px 15px;border:0;border-radius:6px;background:#198754;color:#fff;cursor:pointer;font-size:14px}
button.secondary{background:#2563eb}
button.danger{background:#dc3545}
button.warning{background:#ffc107;color:#000}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:8px;border-bottom:1px solid #eef2f7;font-size:13px;vertical-align:top}
th{background:#f8fafc;position:sticky;top:0}
.tag{padding:4px 8px;border-radius:6px;font-size:12px}
.ok{background:#ecfdf5;color:#065f46}
.warn{background:#fff7ed;color:#92400e}
.actions button{margin-right:4px;margin-bottom:4px}
.patient-photo{width:40px;height:40px;border-radius:50%;object-fit:cover;margin-right:10px}
.sort-controls{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.sort-controls select{flex:1;min-width:150px}
.ocr-section{background:#e0f2fe;padding:15px;border-radius:8px;margin-bottom:15px;display:none}
.ocr-result{background:#fff;padding:10px;border-radius:6px;margin-top:10px;max-height:200px;overflow-y:auto}
.extracted-data{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
.bulk-actions{display:flex;gap:10px;margin:15px 0;flex-wrap:wrap}
.loading{opacity:0.6;pointer-events:none}
.spinner{border:3px solid #f3f3f3;border-top:3px solid #198754;border-radius:50%;width:20px;height:20px;animation:spin 1s linear infinite;display:inline-block;margin-left:10px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@media(max-width:900px){.form-grid{grid-template-columns:1fr}}
</style>
</head>

<body>
<div class="container">

<h1>Baxnaano Hospital</h1>
<div class="sub">Patient Management, OCR Import & Auto Organization System</div>

<!-- OCR IMPORT SECTION -->
<div id="ocrSection" class="ocr-section">
  <h3>📸 Import Patients from Image (OCR)</h3>
  <input type="file" id="ocrImage" accept="image/*" onchange="processImage(event)">
  <div id="ocrStatus"></div>
  <div id="ocrResult" class="ocr-result" style="display:none">
    <h4>Extracted Data:</h4>
    <div id="extractedData"></div>
    <button onclick="addExtractedPatients()" class="secondary">Add All to System</button>
    <button onclick="clearOcr()" class="danger">Clear</button>
  </div>
</div>

<button onclick="toggleOcrSection()" class="warning">Show/Hide OCR Import</button>

<!-- BULK ACTIONS -->
<div class="bulk-actions">
  <button onclick="sortPatients('doctor')">Sort by Doctor</button>
  <button onclick="sortPatients('date')">Sort by Date</button>
  <button onclick="groupByDoctor()">Group by Doctor</button>
  <button onclick="createPatientTabs()">Create Patient Tabs</button>
  <button onclick="importPatientList()" class="secondary">Import Patient List</button>
</div>

<!-- MANUAL ADD FORM -->
<div class="form-section">
  <h3>📝 Add Single Patient</h3>
  <form id="patientForm" onsubmit="event.preventDefault();addPatient();" class="form-grid">
    <input id="name" placeholder="Full Name" required>
    <input id="phone" placeholder="061xxxxxxx" required>
    <select id="doctor" required>
      <option value="">Select Doctor</option>
      <option>Dr Harith Abdulkadir Sheikh Mohamud</option>
      <option>Dr Yahya Shoole</option>
      <option>Dr A Y Hersi</option>
      <option>Sadia Omar Salim</option>
    </select>
    <input type="date" id="visitDate" required>
    <select id="medicine">
      <option value="">Medicine Given?</option>
      <option>Haa</option>
      <option>Maya</option>
    </select>
    <input type="date" id="returnDate" placeholder="Return Date (Optional)">
    <input type="file" id="photo" accept="image/*">
    <button type="submit">Add Patient</button>
    <button type="button" class="secondary" onclick="resetForm()">Reset Form</button>
  </form>
</div>

<!-- MESSAGE TEMPLATES -->
<div class="form-section">
  <h3>✏️ Message Templates</h3>
  <textarea id="msgFollow" placeholder="Follow-up message template..."></textarea>
  <textarea id="msgMed" placeholder="Medicine reminder template..."></textarea>
  <textarea id="msgReturn" placeholder="Return appointment template..."></textarea>
  <button class="secondary" onclick="saveMessages()">Save Templates</button>
</div>

<!-- FILTERS & SORT -->
<div class="sort-controls">
  <select id="filterDoctor" onchange="render()">
    <option value="">All Doctors</option>
    <option>Dr Harith Abdulkadir Sheikh Mohamud</option>
    <option>Dr Yahya Shoole</option>
    <option>Dr A Y Hersi</option>
    <option>Sadia Omar Salim</option>
  </select>
  <select id="filterStatus" onchange="render()">
    <option value="">All Status</option>
    <option value="pending">Pending</option>
    <option value="sent">Sent</option>
  </select>
  <input type="date" id="filterDate" onchange="render()" placeholder="Filter by date">
</div>

<!-- PATIENTS TABLE -->
<table>
<thead>
<tr>
<th>#</th><th>Photo</th><th>Name</th><th>Phone</th><th>Doctor</th><th>Visit Date</th><th>Return Date</th><th>Status</th><th>Actions</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<div class="bulk-actions">
  <button onclick="sendAll('follow')">📲 Send Follow-up ALL</button>
  <button onclick="sendAll('med')">💊 Send Medicine ALL</button>
  <button onclick="sendAll('return')">📅 Send Return ALL</button>
  <button onclick="exportData()">⬇ Export Backup</button>
  <button onclick="clearAllData()" class="danger">Clear All Data</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const PKEY="baxnaano_patients_v2";
const MKEY="baxnaano_messages_v2";

// Initialize
function init(){
  initMessages();
  render();
}
init();

// Data Functions
function loadP(){return JSON.parse(localStorage.getItem(PKEY)||"[]")}
function saveP(d){localStorage.setItem(PKEY,JSON.stringify(d))}
function loadM(){return JSON.parse(localStorage.getItem(MKEY)||"null")}
function saveM(d){localStorage.setItem(MKEY,JSON.stringify(d))}

// Message Templates
function initMessages(){
if(!localStorage.getItem(MKEY)){
saveM({
follow:`Asc Walaal {NAME},

Waxaan kaa soo wacaynaa Baxnaano Hospital. {VISIT_DATE} ayaad soo booqatay {DOCTOR}.

Kawaran xaaladdaada? Daawooyinkii ma qaadatay?

Mahadsanid`,
med:`Asc Walaal {NAME},

Waxaa muhiim ah in aad si joogto ah u qaadato daawada. Kana warbixiso wax-tarkeeda.

Mahadsanid,
Baxnaano Hospital`,
returnm:`Asc Walaal {NAME},

Fadlan ku soo laabo waqtiga ballinta ({RETURN_DATE}). Haddii aadan imaan karin, nala soo socodsii.

Mahadsanid`
});
}
const m=loadM();
msgFollow.value=m.follow;
msgMed.value=m.med;
msgReturn.value=m.returnm;
}

function saveMessages(){
saveM({follow:msgFollow.value,med:msgMed.value,returnm:msgReturn.value});
alert("Templates saved!");
}

// OCR Functions
function toggleOcrSection(){
  const section = document.getElementById('ocrSection');
  section.style.display = section.style.display === 'none' ? 'block' : 'none';
}

async function processImage(event){
  const file = event.target.files[0];
  if(!file) return;
  
  const statusDiv = document.getElementById('ocrStatus');
  const resultDiv = document.getElementById('ocrResult');
  statusDiv.innerHTML = '<div class="spinner"></div> Processing image...';
  resultDiv.style.display = 'none';
  
  try {
    const worker = await Tesseract.createWorker('eng');
    const { data: { text } } = await worker.recognize(file);
    await worker.terminate();
    
    parseExtractedText(text);
    statusDiv.innerHTML = '<span style="color:#198754">✓ Extraction successful!</span>';
    resultDiv.style.display = 'block';
  } catch(error){
    statusDiv.innerHTML = `<span style="color:#dc3545">Error: ${error.message}</span>`;
  }
}

function parseExtractedText(text){
  const lines = text.split('\n').filter(l => l.trim());
  const extractedPatients = [];
  
  // Simple parsing - adjust based on your document format
  lines.forEach(line => {
    // Look for patterns like: "Name - Doctor - Phone - Date"
    const parts = line.split(/[-,]/).map(p => p.trim());
    if(parts.length >= 4){
      extractedPatients.push({
        name: parts[0] || '',
        doctor: parts[1] || '',
        phone: parts[2] || '',
        visit: parts[3] || '',
        medicine: '',
        returnDate: ''
      });
    }
  });
  
  window.extractedPatients = extractedPatients;
  displayExtractedData();
}

function displayExtractedData(){
  const container = document.getElementById('extractedData');
  if(!window.extractedPatients || window.extractedPatients.length === 0){
    container.innerHTML = '<p style="color:#6b7280">No patient data found. Try a clearer image.</p>';
    return;
  }
  
  container.innerHTML = window.extractedPatients.map((p, i) => `
    <div style="border:1px solid #e5e7eb;padding:10px;border-radius:6px">
      <strong>${i+1}. ${p.name}</strong><br>
      <small>Dr: ${p.doctor}<br>Phone: ${p.phone}<br>Date: ${p.visit}</small>
    </div>
  `).join('');
}

function addExtractedPatients(){
  if(!window.extractedPatients || window.extractedPatients.length === 0) return;
  
  const data = loadP();
  let addedCount = 0;
  
  window.extractedPatients.forEach(p => {
    // Validate phone number
    const phone = p.phone.replace(/\D/g, '');
    if(p.name && phone.length >= 9){
      data.push({
        id: Date.now() + Math.random(),
        name: p.name,
        phone: phone,
        doctor: p.doctor || 'Not specified',
        visit: p.visit || new Date().toISOString().split('T')[0],
        returnDate: p.returnDate || '',
        medicine: p.medicine || '',
        photo: '',
        sent: {}
      });
      addedCount++;
    }
  });
  
  saveP(data);
  render();
  alert(`Successfully added ${addedCount} patients!`);
  clearOcr();
}

function clearOcr(){
  document.getElementById('ocrImage').value = '';
  document.getElementById('ocrResult').style.display = 'none';
  document.getElementById('ocrStatus').innerHTML = '';
  window.extractedPatients = [];
}

// Patient Management
function addPatient(){
  const file = photo.files[0];
  const reader = new FileReader();
  
  reader.onload = function(e){
    const data = loadP();
    const patient = {
      id: Date.now(),
      name: name.value,
      phone: phone.value.replace(/\D/g, ''),
      doctor: doctor.value,
      visit: visitDate.value,
      returnDate: returnDate.value || '',
      medicine: medicine.value || '',
      photo: e.target.result || '',
      sent: {},
      createdAt: new Date().toISOString()
    };
    
    data.push(patient);
    saveP(data);
    document.getElementById("patientForm").reset();
    render();
    alert("Patient added successfully!");
  };
  
  if(file) reader.readAsDataURL(file);
  else reader.onload({target: {result: ""}});
}

function resetForm(){
  document.getElementById("patientForm").reset();
}

function buildMsg(p,type){
  const m=loadM();
  let t = type==="follow" ? m.follow : type==="med" ? m.med : m.returnm;
  return t
    .replaceAll("{NAME}", p.name)
    .replaceAll("{DOCTOR}", p.doctor)
    .replaceAll("{VISIT_DATE}", p.visit)
    .replaceAll("{RETURN_DATE}", p.returnDate || "Not scheduled");
}

function sendOne(p,type){
  const msg = buildMsg(p,type);
  const num = "252" + p.phone.replace(/^0/, "");
  window.open("https://wa.me/" + num + "?text=" + encodeURIComponent(msg));
  p.sent[type] = true;
  const data = loadP();
  const index = data.findIndex(d => d.id === p.id);
  if(index !== -1){
    data[index] = p;
    saveP(data);
    render();
  }
}

function sendAll(type){
  const patients = loadP();
  const filterDoctor = document.getElementById('filterDoctor').value;
  const filterDate = document.getElementById('filterDate').value;
  
  let filtered = patients;
  if(filterDoctor) filtered = filtered.filter(p => p.doctor === filterDoctor);
  if(filterDate) filtered = filtered.filter(p => p.visit === filterDate);
  
  if(filtered.length === 0){
    alert("No patients match the current filters!");
    return;
  }
  
  if(confirm(`Send ${type} message to ${filtered.length} patients?`)){
    filtered.forEach((p,i) => setTimeout(() => sendOne(p,type), i * 1500));
  }
}

// Sorting & Grouping
function sortPatients(criteria){
  const data = loadP();
  if(criteria === 'doctor'){
    data.sort((a,b) => a.doctor.localeCompare(b.doctor) || a.name.localeCompare(b.name));
  } else if(criteria === 'date'){
    data.sort((a,b) => new Date(b.visit) - new Date(a.visit));
  }
  saveP(data);
  render();
  alert(`Sorted by ${criteria}!`);
}

function groupByDoctor(){
  const data = loadP();
  const grouped = {};
  data.forEach(p => {
    if(!grouped[p.doctor]) grouped[p.doctor] = [];
    grouped[p.doctor].push(p);
  });
  
  let html = '<h3>Patients Grouped by Doctor</h3>';
  Object.keys(grouped).sort().forEach(doctor => {
    html += `<h4>${doctor} (${grouped[doctor].length} patients)</h4>`;
    html += '<table style="margin-bottom:20px">';
    html += '<tr><th>Name</th><th>Phone</th><th>Visit</th></tr>';
    grouped[doctor].forEach(p => {
      html += `<tr><td>${p.name}</td><td>${p.phone}</td><td>${p.visit}</td></tr>`;
    });
    html += '</table>';
  });
  
  const newWindow = window.open('', '_blank');
  newWindow.document.write(html);
}

function createPatientTabs(){
  const data = loadP();
  const tabWindow = window.open('', '_blank');
  let tabsHtml = `
    <html>
    <head>
      <style>
        body{font-family:Inter,system-ui;padding:20px}
        .tab{width:300px;height:150px;border:2px solid #2563eb;border-radius:8px;padding:15px;margin:10px;display:inline-block;vertical-align:top}
        .tab img{width:50px;height:50px;border-radius:50%;object-fit:cover;float:right}
        .tab h4{margin:0 0 10px 0}
        .tab p{margin:5px 0;font-size:12px}
        .print-btn{position:fixed;top:20px;right:20px;padding:10px;background:#198754;color:#fff;border:0;border-radius:6px;cursor:pointer}
      </style>
    </head>
    <body>
      <button class="print-btn" onclick="window.print()">Print All Tabs</button>
      <h2>Patient Tabs - Total: ${data.length}</h2>
  `;
  
  data.forEach(p => {
    tabsHtml += `
      <div class="tab">
        ${p.photo ? `<img src="${p.photo}">` : ''}
        <h4>${p.name}</h4>
        <p><strong>Phone:</strong> ${p.phone}</p>
        <p><strong>Doctor:</strong> ${p.doctor}</p>
        <p><strong>Visit:</strong> ${p.visit}</p>
        ${p.returnDate ? `<p><strong>Return:</strong> ${p.returnDate}</p>` : ''}
      </div>
    `;
  });
  
  tabsHtml += '</body></html>';
  tabWindow.document.write(tabsHtml);
}

function importPatientList(){
  const input = prompt("Paste patient data (Name,Doctor,Phone,Date - one per line):");
  if(!input) return;
  
  const lines = input.split('\n').filter(l => l.trim());
  const data = loadP();
  let added = 0;
  
  lines.forEach(line => {
    const parts = line.split(/[,;-]/).map(p => p.trim());
    if(parts.length >= 4){
      data.push({
        id: Date.now() + Math.random(),
        name: parts[0],
        doctor: parts[1],
        phone: parts[2].replace(/\D/g, ''),
        visit: parts[3],
        returnDate: parts[4] || '',
        medicine: '',
        photo: '',
        sent: {},
        createdAt: new Date().toISOString()
      });
      added++;
    }
  });
  
  saveP(data);
  render();
  alert(`Imported ${added} patients!`);
}

// Render with Filters
function render(){
  const data = loadP();
  const tbody = document.getElementById('body');
  const filterDoctor = document.getElementById('filterDoctor').value;
  const filterStatus = document.getElementById('filterStatus').value;
  const filterDate = document.getElementById('filterDate').value;
  
  let filtered = data;
  if(filterDoctor) filtered = filtered.filter(p => p.doctor === filterDoctor);
  if(filterStatus) filtered = filtered.filter(p => filterStatus === 'sent' ? p.sent.follow : !p.sent.follow);
  if(filterDate) filtered = filtered.filter(p => p.visit === filterDate);
  
  tbody.innerHTML = filtered.map((p,i) => `
    <tr>
      <td>${i+1}</td>
      <td>${p.photo ? `<img src="${p.photo}" class="patient-photo">` : ''}</td>
      <td><strong>${p.name}</strong></td>
      <td>${p.phone}</td>
      <td>${p.doctor}</td>
      <td>${p.visit}</td>
      <td>${p.returnDate || '-'}</td>
      <td><span class="tag ${p.sent.follow?'ok':'warn'}">${p.sent.follow?'Sent':'Pending'}</span></td>
      <td class="actions">
        <button onclick='sendOne(${JSON.stringify(p)},"follow")'>Follow</button>
        <button onclick='sendOne(${JSON.stringify(p)},"med")'>Med</button>
        <button onclick='sendOne(${JSON.stringify(p)},"return")'>Return</button>
      </td>
    </tr>
  `).join('');
}

// Export & Clear
function exportData(){
  const blob = new Blob([JSON.stringify(loadP(),null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `baxnaano_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}

function clearAllData(){
  if(confirm("⚠️ Are you sure you want to delete ALL patient data? This cannot be undone!")){
    localStorage.removeItem(PKEY);
    render();
    alert("All data cleared!");
  }
}
</script>
</body>
</html>
